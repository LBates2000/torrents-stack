changelog:
  categories:
    - title: "🚀 Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "🛠 Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "🔐 Security"
      labels:
        - "security"
    - title: "🧰 Maintenance"
      labels:
        - "maintenance"
        - "dependencies"
    - title: "📚 Documentation"
      labels:
        - "documentation"
  exclude:
    labels:
      - "skip-changelog"
